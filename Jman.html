DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>jmanTV 3D | Haunted City Mall</title>
    <script src="https://cloudflare.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', Gadget, sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; }
        
        /* HUD Display */
        #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; border: 0px solid #ff00ff; transition: border 0.2s; }
        #captions { position: absolute; bottom: 10%; width: 100%; text-align: center; font-size: 32px; text-shadow: 4px 4px #000; }

        /* Start Menu */
        #start-menu { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 100; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .start-btn { 
            padding: 20px 50px; background: #fbc02d; color: #000; 
            border: none; border-radius: 50px; font-size: 24px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 0 20px #fbc02d;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="captions">CLICK START TO ENTER CITY</div>
    </div>

    <div id="start-menu">
        <h1 style="color:#fbc02d; margin-bottom:10px;">jmanTV 3D SPECIAL</h1>
        <p style="margin-bottom:30px; color:#888;">POV: Haunted City Mall (1 Hour)</p>
        <button class="start-btn" onclick="launchSpecial()">START SPECIAL</button>
    </div>

    <script>
        let scene, camera, renderer, k9, ghost, hands;
        let running = false;

        function launchSpecial() {
            document.getElementById('start-menu').style.display = 'none';
            running = true;
            initScene();
            startVoices();
        }

        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambient);
            const spot = new THREE.PointLight(0xfbc02d, 1, 50);
            spot.position.set(0, 10, 0);
            scene.add(spot);

            // Floor
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x111111}));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // K9 (Yellow)
            k9 = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), new THREE.MeshStandardMaterial({color: 0xfbc02d}));
            k9.position.set(2, 1, -5);
            scene.add(k9);

            // Ghost (Pink)
            ghost = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), new THREE.MeshStandardMaterial({color: 0xff00ff, transparent: true, opacity: 0}));
            ghost.position.set(-3, 6, -12);
            scene.add(ghost);

            // Blue POV Hands
            hands = new THREE.Group();
            const handMat = new THREE.MeshStandardMaterial({color: 0x0088ff});
            const left = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 1), handMat);
            left.position.set(-1.5, -1, -2);
            const right = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 1), handMat);
            right.position.set(1.5, -1, -2);
            hands.add(left, right);
            scene.add(hands);

            camera.position.y = 2;
            render();
        }

        function render() {
            requestAnimationFrame(render);
            if(running) {
                // Gorilla Bobbing
                camera.position.y = 2 + Math.sin(Date.now() * 0.006) * 0.1;
                hands.position.y = Math.sin(Date.now() * 0.01) * 0.15;
                ghost.position.y = 5 + Math.sin(Date.now() * 0.003) * 2;
            }
            renderer.render(scene, camera);
        }

        // --- REALISTIC SCRIPT & VOICES ---
        async function startVoices() {
            const script = [
                { n: "jman", t: "YO K9! This City lobby is actually empty! We have the whole mall to ourselves!" },
                { n: "k9", t: "I don't know Jman... the lighting looks weird. Is that pink mist in the tunnel?" },
                { n: "jman", t: "Mist? K9, you're trippin! It's just the neon lights from the hat shop!" },
                { n: "k9", t: "JMAN! BEHIND YOU! ON THE BRIDGE! IT'S DAISY09!" },
                { n: "ghost", t: "..." },
                { n: "jman", t: "Wait... why can't I move my hands? K9, why is your character turning grey?!" },
                { n: "k9", t: "SHE BANNED ME! JMAN, I'M GONE! RUNNNN!" },
                { n: "jman", t: "K9?! K9!! HE'S ACTUALLY BANNED! I'M HIDING IN THE BASEMENT!" }
            ];

            // 1-Hour Loop Logic
            for (let i = 0; i < 400; i++) {
                let line = script[i % script.length];
                
                if(line.n === "ghost") { 
                    ghost.material.opacity = 0.5;
                    document.getElementById('hud').style.border = "30px solid #ff00ff";
                }
                if(line.t.includes("BANNED")) {
                    k9.material.color.set(0x444444); // Stone mode
                    document.getElementById('hud').style.border = "30px solid red";
                }
                if(line.n === "jman") {
                    document.getElementById('hud').style.border = "0px solid transparent";
                }

                await speak(line.t, line.n);
            }
        }

        function speak(text, name) {
            return new Promise(resolve => {
                const utterance = new SpeechSynthesisUtterance(text);
                const cap = document.getElementById('captions');
                
                if(name === "jman") {
                    utterance.pitch = 1.8; utterance.rate = 1.3;
                    cap.style.color = "#0088ff"; cap.innerText = "JMAN: " + text;
                } else if(name === "k9") {
                    utterance.pitch = 0.7; utterance.rate = 1.0;
                    cap.style.color = "#fbc02d"; cap.innerText = "K9: " + text;
                } else {
                    utterance.pitch = 0.1; utterance.rate = 0.5;
                    cap.style.color = "#ff00ff"; cap.innerText = "[DISTORTED STATIC]";
                }

                utterance.onend = () => resolve();
                window.speechSynthesis.speak(utterance);
            });
        }
    </script>
</body>
</html>
